workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Generate pristine project
        script: |
          mv lib lib_user
          mv pubspec.yaml pubspec_user.yaml
          rm -rf android ios test
          flutter create --project-name shift_alarm_app --platforms=android --org com.example .
          rm -rf lib
          mv lib_user lib
          rm pubspec.yaml
          mv pubspec_user.yaml pubspec.yaml

      - name: Inject Permissions & Remove Internet
        script: |
          # Add Alarm, Vibrate, and Notification permissions
          sed -i '' 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>|' android/app/src/main/AndroidManifest.xml
          
          # REMOVE INTERNET PERMISSIONS FOR 100% OFFLINE APP
          sed -i '' '/android.permission.INTERNET/d' android/app/src/main/AndroidManifest.xml
          sed -i '' '/android.permission.ACCESS_NETWORK_STATE/d' android/app/src/main/AndroidManifest.xml

      - name: Inject Java 8 Desugaring
        script: |
          if [ -f "android/app/build.gradle.kts" ]; then
            sed -i '' 's|compileOptions {|compileOptions {\n        isCoreLibraryDesugaringEnabled = true|' android/app/build.gradle.kts
            printf '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:1.2.2")\n}\n' >> android/app/build.gradle.kts
          else
            sed -i '' 's|compileOptions {|compileOptions {\n        coreLibraryDesugaringEnabled true|' android/app/build.gradle
            printf '\ndependencies {\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:1.2.2"\n}\n' >> android/app/build.gradle
          fi

      - name: Get Flutter packages
        script: flutter pub get
        
      - name: Force Android 15 (SDK 36) for all packages
        script: |
          # Force compileSdk to 36
          find /Users/builder/.pub-cache/hosted/pub.dev/ -name "*.gradle" -o -name "*.gradle.kts" | xargs perl -pi -e 's/compileSdk(?:Version)?\s+\d+/compileSdk 36/g'
          
          # Force targetSdk to 36 in the main app
          if [ -f "android/app/build.gradle.kts" ]; then
            sed -i '' 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 36/' android/app/build.gradle.kts
          else
            sed -i '' 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 36/' android/app/build.gradle
          fi
        
      - name: Build Release APK
        script: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/debug-info
        
    artifacts:
      - build/**/outputs/**/*.apk
