workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Generate pristine project
        script: |
          # Move your code out of the way
          mv lib lib_user
          mv pubspec.yaml pubspec_user.yaml
          
          # Delete all old boilerplate files causing errors
          rm -rf android ios test
          
          # Create a 100% fresh standard Flutter project
          flutter create --project-name shift_alarm_app --platforms=android --org com.example .
          
          # Put your code back
          rm -rf lib
          mv lib_user lib
          rm pubspec.yaml
          mv pubspec_user.yaml pubspec.yaml

      - name: Safely inject permissions and settings
        script: |
          python3 - <<'PY'
          import os

          # 1. Add permissions to AndroidManifest.xml
          manifest_path = "android/app/src/main/AndroidManifest.xml"
          with open(manifest_path, "r") as f:
              content = f.read()
          if "android.permission.CAMERA" not in content:
              content = content.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>'
              )
              with open(manifest_path, "w") as f:
                  f.write(content)

          # 2. Add Java 8 Desugaring to build.gradle or build.gradle.kts
          gradle_path = "android/app/build.gradle"
          is_kotlin = False
          if not os.path.exists(gradle_path):
              gradle_path = "android/app/build.gradle.kts"
              is_kotlin = True

          with open(gradle_path, "r") as f:
              content = f.read()

          if is_kotlin:
              # Kotlin DSL syntax (uses = and parentheses)
              if "isCoreLibraryDesugaringEnabled" not in content:
                  content = content.replace(
                      "compileOptions {",
                      "compileOptions {\n        isCoreLibraryDesugaringEnabled = true"
                  )
              if "coreLibraryDesugaring(" not in content:
                  content = content.replace(
                      "dependencies {",
                      "dependencies {\n    coreLibraryDesugaring(\"com.android.tools:desugar_jdk_libs:1.2.2\")"
                  )
          else:
              # Groovy syntax (uses spaces)
              if "coreLibraryDesugaringEnabled" not in content:
                  content = content.replace(
                      "compileOptions {",
                      "compileOptions {\n        coreLibraryDesugaringEnabled true"
                  )
              if "coreLibraryDesugaring " not in content:
                  content = content.replace(
                      "dependencies {",
                      "dependencies {\n    coreLibraryDesugaring \"com.android.tools:desugar_jdk_libs:1.2.2\""
                  )

          with open(gradle_path, "w") as f:
              f.write(content)
          PY

      - name: Get Flutter packages
        script: flutter pub get
        
      - name: Build Debug APK
        script: flutter build apk --debug
        
    artifacts:
      - build/**/outputs/**/*.apk
